<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Responder Encuesta</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 480px; margin: 40px auto; padding: 0 16px; }
  h1 { font-size: 1.4rem; }
  fieldset { border: 1px solid #ddd; border-radius: 8px; margin-bottom: 16px; padding: 12px 16px; }
  legend { font-weight: 600; }
  label { display: block; margin: 6px 0; cursor: pointer; }
  button { background: #2563eb; color: white; border: none; padding: 10px 18px; border-radius: 6px; cursor: pointer; font-size: 1rem; }
  button:disabled { background: #9ca3af; cursor: not-allowed; }
  #msg { margin-top: 12px; font-size: 0.9rem; color: #16a34a; }
</style>
</head>
<body>
  <h1 id="titulo">Cargando encuesta…</h1>
  <form id="encuestaForm"></form>
  <button id="enviarBtn" type="button">Enviar respuestas</button>
  <p id="msg"></p>

<script>
// TODO: reemplazar por fetch a la API real de Yadira (GET /encuestas/{id})
// cuando esté disponible, ej: const encuesta = await fetch(`/encuestas/${surveyId}`).then(r => r.json());
const surveyId = 1;
const encuestaEjemplo = {
  title: "Satisfacción del Cliente",
  questions: [
    {
      question_id: 1,
      text: "¿Cómo calificarías el soporte técnico?",
      options: [
        { option_id: 1, text: "Excelente" },
        { option_id: 2, text: "Bueno" },
        { option_id: 3, text: "Regular" },
        { option_id: 4, text: "Malo" }
      ]
    }
  ]
};

function renderEncuesta(encuesta) {
  document.getElementById("titulo").textContent = encuesta.title;
  const form = document.getElementById("encuestaForm");
  form.innerHTML = "";

  encuesta.questions.forEach(q => {
    const fieldset = document.createElement("fieldset");
    const legend = document.createElement("legend");
    legend.textContent = q.text;
    fieldset.appendChild(legend);

    q.options.forEach(opt => {
      const label = document.createElement("label");
      label.innerHTML = `
        <input type="radio" name="question_${q.question_id}" value="${opt.option_id}">
        ${opt.text}
      `;
      fieldset.appendChild(label);
    });

    form.appendChild(fieldset);
  });
}

function recolectarRespuestas(encuesta) {
  const respuestas = [];
  encuesta.questions.forEach(q => {
    const seleccionado = document.querySelector(`input[name="question_${q.question_id}"]:checked`);
    respuestas.push({
      question_id: q.question_id,
      option_id: seleccionado ? Number(seleccionado.value) : null
    });
  });
  return respuestas;
}

renderEncuesta(encuestaEjemplo);

document.getElementById("enviarBtn").addEventListener("click", async () => {
  const respuestas = recolectarRespuestas(encuestaEjemplo);
  const sinResponder = respuestas.some(r => r.option_id === null);
  if (sinResponder) {
    document.getElementById("msg").style.color = "#dc2626";
    document.getElementById("msg").textContent = "Responde todas las preguntas antes de enviar.";
    return;
  }

  // TODO: reemplazar por POST real cuando Yadira exponga el endpoint de votos
  // await fetch(`/encuestas/${surveyId}/votar`, {
  //   method: "POST",
  //   headers: { "Content-Type": "application/json" },
  //   body: JSON.stringify({ survey_id: surveyId, answers: respuestas })
  // });

  console.log("Respuestas a enviar:", { survey_id: surveyId, answers: respuestas });
  document.getElementById("msg").style.color = "#16a34a";
  document.getElementById("msg").textContent = "¡Respuesta registrada! (simulada — falta conectar POST real)";
});
</script>
</body>
</html>
