version: "3.9"

services:
  api:
    build: .
    container_name: gamma_api
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - gamma_network

  db:
    image: postgres:16-alpine
    container_name: gamma_db
    restart: always
    environment:
      POSTGRES_USER: gamma_user
      POSTGRES_PASSWORD: gamma_pass
      POSTGRES_DB: gamma_polls
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gamma_user -d gamma_polls"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - gamma_network

  redis:
    image: redis:7-alpine
    container_name: gamma_redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - gamma_network

volumes:
  postgres_data:

networks:
  gamma_network:
    driver: bridge